# Render Blueprint — free Docker web service for the .NET 8 API.
# In Render: New → Blueprint → pick this repo. Then set the 3 secret env vars below.
services:
  - type: web
    name: spokenenglish-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore        # keep same region as the Neon DB (ap-southeast-1)
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL     # Neon connection string (postgresql://...sslmode=require)
        sync: false
      - key: JWT_KEY          # strong random secret, 32+ chars
        sync: false
      - key: ALLOWED_ORIGIN   # https://spoken-english-ui.vercel.app
        sync: false
